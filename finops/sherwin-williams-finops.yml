description: FOCUS-aligned FinOps placeholder for Sherwin-Williams supplier and EDI integrations. No
  public API pricing or billing surface exists; cost is reflected through procurement contracts and
  goods/services pricing rather than per-call usage charges.
sources:
  - https://www.sherwin-williams.com/
notes: Sherwin-Williams does not bill API consumption directly. FinOps treatment is negotiated through
  supplier contracts; no public billing model, FOCUS exports, or usage telemetry is documented.

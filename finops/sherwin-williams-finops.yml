meters:
  - name: contractual_integration
    description: Volume and cost are governed by the supplier or EDI contract rather than per-API meters.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Spend visibility for Sherwin-Williams integrations comes from procurement and AP systems
      receiving the underlying goods/services invoices, not from a usage API.
  - name: Allocation
    description: Allocate cost via the originating purchase order, supplier ID, and cost center captured
      in the procurement system; tag EDI traffic with the contract reference.
  - name: Optimization
    description: Optimization is contractual — renegotiate supplier terms, consolidate EDI partners,
      and reduce duplicate integration touchpoints rather than tuning request volume.
  - name: Accountability
    description: Procurement and supply-chain leaders own Sherwin-Williams supplier spend; integration
      teams own technical SLA conformance.

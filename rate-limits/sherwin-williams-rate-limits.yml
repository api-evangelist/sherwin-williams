description: Sherwin-Williams does not publish public API rate limits. Supplier and EDI traffic shaping
  is governed by contractual terms negotiated with each integration partner. No public throttle thresholds,
  burst allowances, or response headers are documented.
sources:
  - https://www.sherwin-williams.com/
notes: No public rate-limit documentation. Limits, response codes, and retry semantics are defined per
  contract. Reconciliation pending direct vendor confirmation.
responseCodes:
  throttled: 429
limits:
  - name: Contractual Limit
    scope: contract
    metric: varies
    limit: see contract
    notes: Per-partner limits are defined in supplier integration agreements; no public schedule exists.
policies:
  - name: Contractual Governance
    description: Throughput, burst, and quota terms are set in each supplier or EDI contract; consumers
      should follow the limits, retry behavior, and escalation paths defined in their integration agreement.
